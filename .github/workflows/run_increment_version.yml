name: Test increment version
on: [push]

jobs:
  test-python:
    runs-on: ubuntu-latest
    if: github.repository == 'candango/increment-version'
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
      - name: Create mock Python version file
        run: |
          echo '__version__ = (0, 0, 1)' > mock_init.py
      - name: Run Action (Local - Python)
        id: increment
        uses: ./
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          language: python
          file-path: mock_init.py
          is-prerelease: true
          prerelease-type: a
      - name: Verify Python update
        run: |
          echo "Content of mock_init.py:"
          cat mock_init.py
          # Python uses commas in tuple. We check for core version components.
          # The variable will have something like 0.0.14a1
          # The file will have (0, 0, 14, 'a1')
          grep "0, 0" mock_init.py
          grep "a1" mock_init.py
          echo "Python Ghost Update Verified!"

  test-js:
    runs-on: ubuntu-latest
    if: github.repository == 'candango/increment-version'
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Action (Local - JS)
        id: increment
        uses: ./
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          language: javascript
          is-prerelease: true
          prerelease-type: b
      - name: Verify JS update
        run: |
          echo "Content of package.json (version part):"
          cat package.json | grep '"version":'
          # JS uses SemVer hyphen for pre-release (e.g., -b1)
          cat package.json | grep "\-b"
          echo "JS Ghost Update Verified!"
