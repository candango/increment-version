name: Test increment version
on: [push]

jobs:
  test-python:
    runs-on: ubuntu-latest
    if: github.repository == 'candango/increment-version'
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
      - name: Create mock Python version file
        run: |
          echo '__version__ = (0, 0, 1)' > mock_init.py
      - name: Run Action (Local - Python)
        id: increment
        uses: ./
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          language: python
          file-path: mock_init.py
          is-prerelease: true
          prerelease-type: a
      - name: Verify Python update
        run: |
          # Robust verification: check if the output version is in the file
          NEW_VERSION="${{ steps.increment.outputs.new-version }}"
          echo "Verifying if $NEW_VERSION is in mock_init.py..."
          grep "$NEW_VERSION" mock_init.py
          echo "Python Ghost Update Verified!"

  test-js:
    runs-on: ubuntu-latest
    if: github.repository == 'candango/increment-version'
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Action (Local - JS)
        id: increment
        uses: ./
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          language: javascript
          is-prerelease: true
          prerelease-type: b
      - name: Verify JS update
        run: |
          NEW_VERSION="${{ steps.increment.outputs.new-version }}"
          echo "Verifying if $NEW_VERSION is in package.json..."
          cat package.json | grep "$NEW_VERSION"
          echo "JS Ghost Update Verified!"
