name: Test increment version
on: [push]

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    if: github.repository == 'candango/increment-version'
    strategy:
      fail-fast: false
      max-parallel: 1 # Sequential to avoid TEST_VERSION variable race conditions
      matrix:
        language: [python, javascript]
        auth_method: [app, token]
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Create mock Python version file
        if: matrix.language == 'python'
        run: |
          cat <<EOF > mock_init.py
          __version__ = (0, 0, 1)
          
          def get_version():
              if isinstance(__version__[-1], str):
                  return '.'.join(map(str, __version__[:-1])) + __version__[-1]
              return ".".join(map(str, __version__))
          EOF

      - name: Run Action (Matrix)
        id: increment
        uses: ./
        with:
          # Use App if auth_method is app, otherwise use PAT
          github-token: ${{ matrix.auth_method == 'token' && secrets.TEST_PAT || '' }}
          app-id: ${{ matrix.auth_method == 'app' && vars.APP_ID || '' }}
          private-key: ${{ matrix.auth_method == 'app' && secrets.APP_PRIVATE_KEY || '' }}
          language: ${{ matrix.language }}
          file-path: ${{ matrix.language == 'python' && 'mock_init.py' || '' }}
          current-version-variable: TEST_VERSION
          is-prerelease: true
          prerelease-type: ${{ matrix.language == 'python' && 'a' || 'b' }}

      - name: Verify Python update
        if: matrix.language == 'python'
        run: |
          echo "Content of mock_init.py:"
          cat mock_init.py
          EXPECTED_VERSION="${{ steps.increment.outputs.new-version }}"
          ACTUAL_VERSION=$(python3 -c "import mock_init; print(mock_init.get_version())")
          echo "Expected: $EXPECTED_VERSION"
          echo "Actual: $ACTUAL_VERSION"
          if [ "$EXPECTED_VERSION" != "$ACTUAL_VERSION" ]; then
            echo "Version mismatch!"
            exit 1
          fi
          echo "Python Ghost Update Verified!"

      - name: Verify JS update
        if: matrix.language == 'javascript'
        run: |
          NEW_VERSION="${{ steps.increment.outputs.new-version }}"
          echo "Verifying if $NEW_VERSION is in package.json..."
          cat package.json | grep "$NEW_VERSION"
          echo "JS Ghost Update Verified!"

      - name: Cleanup Tag
        if: always()
        run: |
          TAG="v${{ steps.increment.outputs.new-version }}"
          if [ -n "$TAG" ] && [ "$TAG" != "v" ]; then
            echo "Cleaning up tag $TAG..."
            git tag -d "$TAG" || true
            git push origin --delete "$TAG" || true
          fi
